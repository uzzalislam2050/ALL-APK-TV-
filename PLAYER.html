<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APK LIVE TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial,sans-serif;
}
#video{
  width:100%;
  height:100vh;
  background:#000;
}
#loader{
  position:fixed;
  inset:0;
  background:#000;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  z-index:9999;
}
#error{
  display:none;
  position:fixed;
  inset:0;
  background:#000;
  color:#ff4444;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  font-size:18px;
  z-index:99999;
}
</style>
</head>

<body>

<div id="loader">Loading Channel...</div>
<div id="error">Stream Failed!<br>Please check m3u8 link.</div>

<video id="video" controls autoplay playsinline></video>

<script>
const video = document.getElementById("video");
const loader = document.getElementById("loader");
const errorBox = document.getElementById("error");

const streamUrl = "http://202.70.146.135:8000/play/a05z/index.m3u8";

function showError(){
  loader.style.display = "none";
  errorBox.style.display = "flex";
}

if (Hls.isSupported()) {
  const hls = new Hls({
    enableWorker: true,
    lowLatencyMode: true
  });

  hls.loadSource(streamUrl);
  hls.attachMedia(video);

  hls.on(Hls.Events.MANIFEST_PARSED, function () {
    loader.style.display = "none";
    video.play().catch(()=>{});
  });

  hls.on(Hls.Events.ERROR, function (event, data) {
    if (data.fatal) showError();
  });

} else if (video.canPlayType("application/vnd.apple.mpegurl")) {
  video.src = streamUrl;
  video.addEventListener("loadedmetadata", function () {
    loader.style.display = "none";
    video.play().catch(()=>{});
  });
  video.addEventListener("error", showError);
} else {
  showError();
}
</script>

</body>
</html>
